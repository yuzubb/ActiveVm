<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pelican Panel — Free Hosting</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f14;
    --surface: #14171f;
    --surface2: #1c2030;
    --surface3: #242840;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --accent: #5b6af5;
    --accent2: #7c89ff;
    --accent-glow: rgba(91,106,245,0.25);
    --text: #e8eaf6;
    --text2: #9098b8;
    --text3: #5a6180;
    --green: #3dd68c;
    --green-bg: rgba(61,214,140,0.12);
    --red: #f55b7e;
    --red-bg: rgba(245,91,126,0.12);
    --amber: #f5a623;
    --amber-bg: rgba(245,166,35,0.12);
    --radius: 10px;
    --radius-lg: 16px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }

  /* ── UTILS ── */
  .hidden { display: none !important; }
  .mono { font-family: 'Space Mono', monospace; }
  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 500; padding: 3px 9px;
    border-radius: 20px; letter-spacing: 0.3px;
  }
  .badge-green  { background: var(--green-bg); color: var(--green); }
  .badge-red    { background: var(--red-bg);   color: var(--red);   }
  .badge-amber  { background: var(--amber-bg); color: var(--amber); }
  .badge-purple { background: rgba(91,106,245,0.15); color: var(--accent2); }

  /* ── BUTTONS ── */
  button { font-family: inherit; cursor: pointer; border: none; }
  .btn {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 9px 18px; border-radius: var(--radius);
    font-size: 13px; font-weight: 500; transition: all 0.15s;
  }
  .btn-primary {
    background: var(--accent); color: #fff;
  }
  .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
  .btn-ghost {
    background: transparent; color: var(--text2);
    border: 1px solid var(--border2);
  }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }
  .btn-danger {
    background: var(--red-bg); color: var(--red);
    border: 1px solid rgba(245,91,126,0.2);
  }
  .btn-danger:hover { background: rgba(245,91,126,0.2); }
  .btn-success {
    background: var(--green-bg); color: var(--green);
    border: 1px solid rgba(61,214,140,0.2);
  }
  .btn-success:hover { background: rgba(61,214,140,0.2); }
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none !important; }

  /* ── INPUTS ── */
  input, select, textarea {
    background: var(--surface2); color: var(--text);
    border: 1px solid var(--border2); border-radius: var(--radius);
    padding: 9px 13px; font-family: inherit; font-size: 14px;
    width: 100%; transition: border-color 0.15s;
  }
  input:focus, select:focus, textarea:focus {
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  /* ── LAYOUT ── */
  #app { min-height: 100vh; }

  /* ──────────────── LANDING PAGE ──────────────── */
  #landing {
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 2rem;
    background:
      radial-gradient(ellipse 80% 60% at 50% -10%, rgba(91,106,245,0.15) 0%, transparent 60%);
  }

  .landing-grid {
    display: grid; gap: 1px;
    position: absolute; inset: 0; pointer-events: none; overflow: hidden;
    opacity: 0.03;
    background-image:
      linear-gradient(rgba(255,255,255,0.8) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.8) 1px, transparent 1px);
    background-size: 48px 48px;
  }

  .landing-inner {
    position: relative; z-index: 1;
    text-align: center; max-width: 560px;
  }

  .landing-logo {
    display: inline-flex; align-items: center; gap: 10px;
    margin-bottom: 2.5rem;
  }
  .landing-logo-icon {
    width: 44px; height: 44px; border-radius: 12px;
    background: var(--accent); display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  .landing-logo span {
    font-family: 'Space Mono', monospace;
    font-size: 20px; font-weight: 700; letter-spacing: -0.5px;
  }

  .landing-title {
    font-size: 3rem; font-weight: 300; line-height: 1.15;
    letter-spacing: -1.5px; margin-bottom: 1rem;
  }
  .landing-title strong { font-weight: 600; color: var(--accent2); }

  .landing-desc {
    color: var(--text2); font-size: 1rem; margin-bottom: 2.5rem;
    line-height: 1.7;
  }

  .discord-btn {
    display: inline-flex; align-items: center; gap: 12px;
    padding: 14px 28px; border-radius: 12px; text-decoration: none;
    background: #5865F2; color: #fff; font-size: 15px; font-weight: 500;
    transition: all 0.2s; box-shadow: 0 4px 20px rgba(88,101,242,0.4);
  }
  .discord-btn:hover { background: #4752c4; transform: translateY(-2px); box-shadow: 0 8px 30px rgba(88,101,242,0.5); }
  .discord-btn svg { width: 22px; height: 22px; fill: #fff; }

  .landing-features {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
    margin-top: 3rem;
  }
  .feature-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 1.25rem;
    text-align: left;
  }
  .feature-card .icon { font-size: 24px; margin-bottom: 8px; }
  .feature-card h3 { font-size: 13px; font-weight: 500; margin-bottom: 5px; }
  .feature-card p { font-size: 12px; color: var(--text2); line-height: 1.5; }

  .error-banner {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    background: var(--red-bg); color: var(--red);
    border: 1px solid rgba(245,91,126,0.3); border-radius: var(--radius);
    padding: 10px 20px; font-size: 13px; z-index: 999;
  }

  /* ──────────────── DASHBOARD ──────────────── */
  #dashboard { display: flex; min-height: 100vh; }

  /* Sidebar */
  .sidebar {
    width: 220px; flex-shrink: 0;
    background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; padding: 1.25rem 1rem;
  }
  .sidebar-logo {
    display: flex; align-items: center; gap: 9px;
    margin-bottom: 2rem; padding: 0 6px;
  }
  .sidebar-logo-icon {
    width: 30px; height: 30px; background: var(--accent);
    border-radius: 8px; display: flex; align-items: center;
    justify-content: center; font-size: 16px;
  }
  .sidebar-logo span { font-family: 'Space Mono', monospace; font-size: 14px; font-weight: 700; }

  .nav-section { margin-bottom: 1.5rem; }
  .nav-label { font-size: 10px; font-weight: 600; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; padding: 0 10px; margin-bottom: 8px; }
  .nav-item {
    display: flex; align-items: center; gap: 9px;
    padding: 8px 10px; border-radius: 8px;
    font-size: 13px; color: var(--text2); cursor: pointer;
    transition: all 0.1s; border: none; background: none;
    width: 100%; text-align: left; font-family: inherit;
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: rgba(91,106,245,0.15); color: var(--accent2); }
  .nav-icon { width: 16px; text-align: center; font-size: 15px; }

  .sidebar-spacer { flex: 1; }

  .sidebar-user {
    display: flex; align-items: center; gap: 9px;
    padding: 10px; border-radius: var(--radius);
    background: var(--surface2); border: 1px solid var(--border);
  }
  .sidebar-avatar {
    width: 32px; height: 32px; border-radius: 50%; overflow: hidden;
    background: var(--accent); display: flex; align-items: center;
    justify-content: center; font-size: 13px; font-weight: 600; flex-shrink: 0;
  }
  .sidebar-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .sidebar-user-info { flex: 1; min-width: 0; }
  .sidebar-username { font-size: 12px; font-weight: 500; truncate: true; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sidebar-role { font-size: 10px; color: var(--text3); }
  .logout-btn { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 15px; padding: 3px; }
  .logout-btn:hover { color: var(--red); }

  /* Main */
  .main { flex: 1; overflow-y: auto; padding: 2rem; min-width: 0; }

  .page-header { margin-bottom: 2rem; }
  .page-header h1 { font-size: 1.5rem; font-weight: 500; letter-spacing: -0.5px; }
  .page-header p { color: var(--text2); font-size: 13px; margin-top: 4px; }

  /* Cards */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 1.5rem;
  }
  .card + .card, .card + .grid, .grid + .card { margin-top: 1.25rem; }

  .card-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.25rem;
  }
  .card-title { font-size: 14px; font-weight: 500; }
  .card-subtitle { font-size: 12px; color: var(--text2); margin-top: 2px; }

  /* Stats row */
  .stats-row {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 1rem; margin-bottom: 1.25rem;
  }
  .stat-card {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 1rem 1.25rem;
  }
  .stat-label { font-size: 11px; color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .stat-value { font-size: 1.75rem; font-weight: 300; letter-spacing: -1px; font-family: 'Space Mono', monospace; }

  /* Server cards */
  .servers-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1rem;
  }
  .server-card {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 1.25rem;
    transition: border-color 0.15s;
  }
  .server-card:hover { border-color: var(--border2); }
  .server-card-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 1rem;
  }
  .server-name { font-size: 15px; font-weight: 500; }
  .server-id { font-size: 10px; color: var(--text3); font-family: 'Space Mono', monospace; margin-top: 2px; }
  .server-expires { margin-bottom: 1rem; }
  .expires-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
  .expires-bar { height: 4px; background: var(--surface3); border-radius: 2px; overflow: hidden; }
  .expires-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
  .expires-text { font-size: 12px; margin-top: 5px; }
  .server-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  /* Empty state */
  .empty-state {
    text-align: center; padding: 3rem 1rem;
    color: var(--text3);
  }
  .empty-state .icon { font-size: 2.5rem; margin-bottom: 1rem; }
  .empty-state h3 { font-size: 15px; color: var(--text2); margin-bottom: 6px; }
  .empty-state p { font-size: 13px; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.75); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center; padding: 1rem;
  }
  .modal {
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: var(--radius-lg); padding: 1.75rem;
    width: 100%; max-width: 440px;
  }
  .modal h2 { font-size: 17px; font-weight: 500; margin-bottom: 1.25rem; }
  .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 1.5rem; }

  .form-group { margin-bottom: 1rem; }
  .form-label { font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 6px; display: block; }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; right: 24px; z-index: 200;
    display: flex; align-items: center; gap: 10px;
    padding: 12px 18px; border-radius: var(--radius);
    font-size: 13px; font-weight: 500;
    animation: slideIn 0.2s ease;
    border: 1px solid transparent;
  }
  .toast-success { background: var(--green-bg); color: var(--green); border-color: rgba(61,214,140,0.2); }
  .toast-error   { background: var(--red-bg);   color: var(--red);   border-color: rgba(245,91,126,0.2); }
  @keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* Admin table */
  .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .data-table th {
    text-align: left; padding: 8px 12px;
    font-size: 11px; font-weight: 500; color: var(--text3);
    text-transform: uppercase; letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
  }
  .data-table td {
    padding: 12px 12px; border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr:hover td { background: var(--surface2); }
  .td-actions { display: flex; gap: 6px; flex-wrap: wrap; }

  /* Spec form */
  .spec-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

  /* Tabs */
  .tabs { display: flex; gap: 4px; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
  .tab {
    padding: 9px 16px; font-size: 13px; font-weight: 500;
    color: var(--text3); cursor: pointer; background: none; border: none;
    border-bottom: 2px solid transparent; transition: all 0.15s;
    margin-bottom: -1px; font-family: inherit;
  }
  .tab:hover { color: var(--text2); }
  .tab.active { color: var(--accent2); border-bottom-color: var(--accent2); }

  @media (max-width: 700px) {
    .sidebar { width: 60px; padding: 1rem 0.5rem; }
    .sidebar-logo span, .nav-label, .nav-item span,
    .sidebar-username, .sidebar-role { display: none; }
    .nav-item { justify-content: center; padding: 8px; }
    .sidebar-user { padding: 8px; justify-content: center; }
    .sidebar-user-info, .logout-btn { display: none; }
    .landing-features { grid-template-columns: 1fr; }
    .landing-title { font-size: 2rem; }
    .spec-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
// ── STATE ──────────────────────────────────────────────────────────────────
let state = {
  page: 'servers',     // servers | admin-users | admin-servers | admin-specs
  me: null,
  servers: [],
  specs: null,
  adminUsers: [],
  adminServers: [],
  modal: null,
  loading: false,
};

// ── ROUTER / BOOT ──────────────────────────────────────────────────────────
async function boot() {
  try {
    const res = await api('GET', '/api/me');
    state.me = res.user;
    state.servers = res.servers;
    state.specs = res.specs;
    if (state.me.is_admin) {
      await loadAdminData();
    }
    render();
  } catch {
    renderLanding();
  }
}

async function loadAdminData() {
  const [users, servers] = await Promise.all([
    api('GET', '/api/admin/users'),
    api('GET', '/api/admin/servers'),
  ]);
  state.adminUsers = users;
  state.adminServers = servers;
}

// ── API ────────────────────────────────────────────────────────────────────
async function api(method, url, body) {
  const r = await fetch(url, {
    method,
    headers: { 'Content-Type': 'application/json' },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!r.ok) {
    const e = await r.json().catch(() => ({ error: 'Error' }));
    throw new Error(e.error || 'Error');
  }
  return r.json().catch(() => ({}));
}

function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function renderLanding() {
  const urlParams = new URLSearchParams(window.location.search);
  const error = urlParams.get('error');
  document.getElementById('app').innerHTML = `
    <div id="landing">
      <div class="landing-grid"></div>
      ${error ? `<div class="error-banner">⚠ ${
        error === 'banned' ? 'あなたのアカウントはBANされています' :
        error === 'auth_failed' ? '認証に失敗しました' : 'エラーが発生しました'
      }</div>` : ''}
      <div class="landing-inner">
        <div class="landing-logo">
          <div class="landing-logo-icon">🦤</div>
          <span>PelicanFree</span>
        </div>
        <h1 class="landing-title">
          無料で使える<br><strong>ゲームサーバー</strong>
        </h1>
        <p class="landing-desc">
          Discordアカウントでログインするだけ。<br>
          最大${2}個のサーバーを無料で作成できます。
        </p>
        <a href="/auth/discord" class="discord-btn">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.003.02.015.04.031.052a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/>
          </svg>
          Discordでログイン
        </a>
        <div class="landing-features">
          <div class="feature-card">
            <div class="icon">⚡</div>
            <h3>即時作成</h3>
            <p>Discordログインで自動的にアカウント作成。すぐにサーバーが使えます。</p>
          </div>
          <div class="feature-card">
            <div class="icon">🔄</div>
            <h3>自動延長</h3>
            <p>期限1日前から延長可能。使い続けることができます。</p>
          </div>
          <div class="feature-card">
            <div class="icon">🛡️</div>
            <h3>Dockerで隔離</h3>
            <p>各サーバーはDockerコンテナで完全に隔離されています。</p>
          </div>
        </div>
      </div>
    </div>
  `;
}

function render() {
  const { me, servers, specs, page, adminUsers, adminServers } = state;
  const isAdmin = me?.is_admin;

  document.getElementById('app').innerHTML = `
    <div id="dashboard">
      <nav class="sidebar">
        <div class="sidebar-logo">
          <div class="sidebar-logo-icon">🦤</div>
          <span>PelicanFree</span>
        </div>
        <div class="nav-section">
          <div class="nav-label">メニュー</div>
          <button class="nav-item ${page === 'servers' ? 'active' : ''}" onclick="setPage('servers')">
            <span class="nav-icon">🖥</span>
            <span>マイサーバー</span>
          </button>
        </div>
        ${isAdmin ? `
        <div class="nav-section">
          <div class="nav-label">管理</div>
          <button class="nav-item ${page === 'admin-users' ? 'active' : ''}" onclick="setPage('admin-users')">
            <span class="nav-icon">👥</span>
            <span>ユーザー管理</span>
          </button>
          <button class="nav-item ${page === 'admin-servers' ? 'active' : ''}" onclick="setPage('admin-servers')">
            <span class="nav-icon">⚙️</span>
            <span>サーバー管理</span>
          </button>
          <button class="nav-item ${page === 'admin-specs' ? 'active' : ''}" onclick="setPage('admin-specs')">
            <span class="nav-icon">🎛</span>
            <span>デフォルト設定</span>
          </button>
        </div>
        ` : ''}
        <div class="sidebar-spacer"></div>
        <div class="sidebar-user">
          <div class="sidebar-avatar">
            ${me?.discord_avatar
              ? `<img src="https://cdn.discordapp.com/avatars/${me.discord_id}/${me.discord_avatar}.png" alt="">`
              : me?.discord_username?.[0]?.toUpperCase() || '?'}
          </div>
          <div class="sidebar-user-info">
            <div class="sidebar-username">${esc(me?.discord_username || '')}</div>
            <div class="sidebar-role">${isAdmin ? '管理者' : 'ユーザー'}</div>
          </div>
          <button class="logout-btn" onclick="logout()" title="ログアウト">↩</button>
        </div>
      </nav>
      <main class="main">
        ${page === 'servers' ? renderServersPage() : ''}
        ${page === 'admin-users' ? renderAdminUsersPage() : ''}
        ${page === 'admin-servers' ? renderAdminServersPage() : ''}
        ${page === 'admin-specs' ? renderAdminSpecsPage() : ''}
      </main>
    </div>
    ${state.modal ? renderModal() : ''}
  `;
}

// ── PAGE: SERVERS ──────────────────────────────────────────────────────────
function renderServersPage() {
  const { me, servers, specs } = state;
  const activeServers = servers.filter(s => !s.is_deleted);
  return `
    <div class="page-header">
      <h1>マイサーバー</h1>
      <p>無料で${me?.max_servers || 2}個までサーバーを作成できます</p>
    </div>
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">使用中</div>
        <div class="stat-value">${activeServers.length} / ${me?.max_servers || 2}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">デフォルト期間</div>
        <div class="stat-value">${specs?.duration_days || 3}<span style="font-size:1rem;color:var(--text2)">日</span></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">CPU</div>
        <div class="stat-value">${specs?.cpu || 100}<span style="font-size:1rem;color:var(--text2)">%</span></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">RAM</div>
        <div class="stat-value">${specs?.memory || 512}<span style="font-size:1rem;color:var(--text2)">MB</span></div>
      </div>
    </div>
    <div class="card">
      <div class="card-header">
        <div>
          <div class="card-title">サーバー一覧</div>
          <div class="card-subtitle">${activeServers.length}個のアクティブなサーバー</div>
        </div>
        <button class="btn btn-primary btn-sm" onclick="openCreateModal()"
          ${activeServers.length >= (me?.max_servers || 2) ? 'disabled' : ''}>
          + 新規作成
        </button>
      </div>
      ${activeServers.length === 0 ? `
        <div class="empty-state">
          <div class="icon">🖥</div>
          <h3>サーバーがありません</h3>
          <p>「新規作成」ボタンでサーバーを作成してください</p>
        </div>
      ` : `
        <div class="servers-grid">
          ${activeServers.map(s => renderServerCard(s)).join('')}
        </div>
      `}
    </div>
  `;
}

function renderServerCard(s) {
  const expires = new Date(s.expires_at);
  const now = new Date();
  const totalMs = 3 * 24 * 60 * 60 * 1000;
  const created = new Date(s.created_at);
  const elapsed = now - created;
  const daysLeft = Math.max(0, (expires - now) / (1000 * 60 * 60 * 24));
  const progress = Math.max(0, Math.min(100, ((expires - now) / totalMs) * 100));
  const barColor = daysLeft > 1 ? 'var(--green)' : daysLeft > 0 ? 'var(--amber)' : 'var(--red)';
  const canExtend = daysLeft <= 1;
  const expired = daysLeft <= 0;

  return `
    <div class="server-card">
      <div class="server-card-header">
        <div>
          <div class="server-name">${esc(s.name)}</div>
          <div class="server-id mono">${s.pelican_server_id?.slice(0,8) || 'pending'}</div>
        </div>
        ${expired
          ? `<span class="badge badge-red">期限切れ</span>`
          : canExtend
            ? `<span class="badge badge-amber">要延長</span>`
            : `<span class="badge badge-green">稼働中</span>`
        }
      </div>
      <div class="server-expires">
        <div class="expires-label">残り期間</div>
        <div class="expires-bar">
          <div class="expires-fill" style="width:${progress}%;background:${barColor}"></div>
        </div>
        <div class="expires-text" style="color:${barColor}">
          ${expired ? '期限切れ' : daysLeft < 1
            ? `${Math.floor(daysLeft * 24)}時間`
            : `${daysLeft.toFixed(1)}日`}
          <span style="color:var(--text3);font-size:11px;margin-left:6px">(${expires.toLocaleDateString('ja-JP')} まで)</span>
        </div>
      </div>
      <div class="server-actions">
        <button class="btn btn-success btn-sm" onclick="extendServer(${s.id})"
          ${canExtend ? '' : 'disabled'}>
          🔄 延長
        </button>
        <button class="btn btn-danger btn-sm" onclick="deleteServer(${s.id})">
          🗑 削除
        </button>
      </div>
    </div>
  `;
}

// ── PAGE: ADMIN USERS ──────────────────────────────────────────────────────
function renderAdminUsersPage() {
  return `
    <div class="page-header">
      <h1>ユーザー管理</h1>
      <p>${state.adminUsers.length}人のユーザー</p>
    </div>
    <div class="card" style="overflow-x:auto">
      <table class="data-table">
        <thead>
          <tr>
            <th>ユーザー</th>
            <th>Discord ID</th>
            <th>サーバー</th>
            <th>上限</th>
            <th>ステータス</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody>
          ${state.adminUsers.map(u => `
            <tr>
              <td>
                <div style="display:flex;align-items:center;gap:8px">
                  <div class="sidebar-avatar" style="width:26px;height:26px;font-size:11px">
                    ${u.discord_avatar
                      ? `<img src="https://cdn.discordapp.com/avatars/${u.discord_id}/${u.discord_avatar}.png" alt="">`
                      : (u.discord_username?.[0]?.toUpperCase() || '?')}
                  </div>
                  ${esc(u.discord_username)}
                  ${u.is_admin ? '<span class="badge badge-purple" style="font-size:9px">管理者</span>' : ''}
                </div>
              </td>
              <td class="mono" style="font-size:11px;color:var(--text3)">${u.discord_id}</td>
              <td>${u.server_count}</td>
              <td>${u.max_servers}</td>
              <td>
                ${u.is_banned
                  ? `<span class="badge badge-red">BAN</span>`
                  : `<span class="badge badge-green">正常</span>`}
              </td>
              <td>
                <div class="td-actions">
                  ${u.is_banned
                    ? `<button class="btn btn-success btn-sm" onclick="unbanUser('${u.discord_id}')">解除</button>`
                    : `<button class="btn btn-danger btn-sm" onclick="banUser('${u.discord_id}')">BAN</button>`}
                  <button class="btn btn-ghost btn-sm" onclick="editMaxServers('${u.discord_id}', ${u.max_servers})">上限変更</button>
                  ${!u.is_admin ? `<button class="btn btn-ghost btn-sm" onclick="addStaff('${u.discord_id}')">管理者化</button>` : ''}
                </div>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
}

// ── PAGE: ADMIN SERVERS ────────────────────────────────────────────────────
function renderAdminServersPage() {
  return `
    <div class="page-header">
      <h1>サーバー管理</h1>
      <p>${state.adminServers.length}個のアクティブサーバー</p>
    </div>
    <div class="card" style="overflow-x:auto">
      <table class="data-table">
        <thead>
          <tr>
            <th>名前</th>
            <th>オーナー</th>
            <th>Pelican ID</th>
            <th>期限</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody>
          ${state.adminServers.map(s => {
            const exp = new Date(s.expires_at);
            const daysLeft = (exp - Date.now()) / (1000*60*60*24);
            return `
            <tr>
              <td>${esc(s.name)}</td>
              <td>${esc(s.discord_username)}</td>
              <td class="mono" style="font-size:11px;color:var(--text3)">${s.pelican_server_id?.slice(0,8)||'-'}</td>
              <td>
                <span style="color:${daysLeft < 1 ? 'var(--red)' : daysLeft < 2 ? 'var(--amber)' : 'var(--green)'}">
                  ${exp.toLocaleDateString('ja-JP')}
                  (${daysLeft > 0 ? daysLeft.toFixed(1)+'日' : '期限切れ'})
                </span>
              </td>
              <td>
                <div class="td-actions">
                  <button class="btn btn-success btn-sm" onclick="adminExtendServer(${s.id})">延長</button>
                  <button class="btn btn-danger btn-sm" onclick="adminDeleteServer(${s.id})">削除</button>
                </div>
              </td>
            </tr>
          `}).join('')}
        </tbody>
      </table>
    </div>
  `;
}

// ── PAGE: ADMIN SPECS ──────────────────────────────────────────────────────
function renderAdminSpecsPage() {
  const s = state.specs || {};
  return `
    <div class="page-header">
      <h1>デフォルト設定</h1>
      <p>新規サーバーのデフォルトスペックと設定を変更します</p>
    </div>
    <div class="card" style="max-width:560px">
      <div class="card-header"><div class="card-title">スペック設定</div></div>
      <div class="spec-grid">
        <div class="form-group">
          <label class="form-label">CPU (%)</label>
          <input type="number" id="spec-cpu" value="${s.cpu||100}" min="10" max="1000">
        </div>
        <div class="form-group">
          <label class="form-label">メモリ (MB)</label>
          <input type="number" id="spec-mem" value="${s.memory||512}" min="128">
        </div>
        <div class="form-group">
          <label class="form-label">ディスク (MB)</label>
          <input type="number" id="spec-disk" value="${s.disk||1024}" min="256">
        </div>
        <div class="form-group">
          <label class="form-label">デフォルト期間 (日)</label>
          <input type="number" id="spec-days" value="${s.duration_days||3}" min="1" max="30">
        </div>
        <div class="form-group">
          <label class="form-label">ユーザーあたり最大サーバー数</label>
          <input type="number" id="spec-max" value="${s.max_servers_per_user||2}" min="1" max="20">
        </div>
      </div>
      <div style="margin-top:1.25rem">
        <button class="btn btn-primary" onclick="saveSpecs()">💾 保存する</button>
      </div>
    </div>
  `;
}

// ── MODAL ──────────────────────────────────────────────────────────────────
function renderModal() {
  const m = state.modal;
  if (!m) return '';
  if (m.type === 'create') {
    return `
      <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
        <div class="modal">
          <h2>🖥 新しいサーバーを作成</h2>
          <div class="form-group">
            <label class="form-label">サーバー名</label>
            <input type="text" id="modal-name" placeholder="例: Minecraft-Server" maxlength="30">
          </div>
          <div style="font-size:12px;color:var(--text3)">
            スペック: CPU ${state.specs?.cpu||100}% / RAM ${state.specs?.memory||512}MB / Disk ${state.specs?.disk||1024}MB<br>
            有効期間: ${state.specs?.duration_days||3}日間
          </div>
          <div class="modal-footer">
            <button class="btn btn-ghost" onclick="closeModal()">キャンセル</button>
            <button class="btn btn-primary" onclick="createServer()">作成する</button>
          </div>
        </div>
      </div>`;
  }
  if (m.type === 'ban') {
    return `
      <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
        <div class="modal">
          <h2>🔨 ユーザーをBAN</h2>
          <div class="form-group">
            <label class="form-label">理由（任意）</label>
            <input type="text" id="modal-ban-reason" placeholder="BANの理由を入力...">
          </div>
          <div class="modal-footer">
            <button class="btn btn-ghost" onclick="closeModal()">キャンセル</button>
            <button class="btn btn-danger" onclick="confirmBan('${m.userId}')">BANする</button>
          </div>
        </div>
      </div>`;
  }
  if (m.type === 'max-servers') {
    return `
      <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
        <div class="modal">
          <h2>📊 最大サーバー数を変更</h2>
          <div class="form-group">
            <label class="form-label">最大サーバー数</label>
            <input type="number" id="modal-max" value="${m.current}" min="0" max="50">
          </div>
          <div class="modal-footer">
            <button class="btn btn-ghost" onclick="closeModal()">キャンセル</button>
            <button class="btn btn-primary" onclick="confirmMaxServers('${m.userId}')">変更する</button>
          </div>
        </div>
      </div>`;
  }
  return '';
}

// ── ACTIONS ────────────────────────────────────────────────────────────────
function setPage(p) { state.page = p; render(); }
function closeModal() { state.modal = null; render(); }
function openCreateModal() { state.modal = { type: 'create' }; render(); setTimeout(() => document.getElementById('modal-name')?.focus(), 50); }

async function logout() {
  await fetch('/auth/logout', { method: 'POST' });
  location.href = '/';
}

async function createServer() {
  const name = document.getElementById('modal-name')?.value?.trim();
  if (!name) return toast('サーバー名を入力してください', 'error');
  try {
    await api('POST', '/api/servers', { name });
    closeModal();
    toast('サーバーを作成しました！');
    await refreshUser();
  } catch (e) { toast(e.message, 'error'); }
}

async function extendServer(id) {
  try {
    await api('POST', `/api/servers/${id}/extend`);
    toast('期間を延長しました！');
    await refreshUser();
  } catch (e) { toast(e.message, 'error'); }
}

async function deleteServer(id) {
  if (!confirm('このサーバーを削除しますか？')) return;
  try {
    await api('DELETE', `/api/servers/${id}`);
    toast('サーバーを削除しました');
    await refreshUser();
  } catch (e) { toast(e.message, 'error'); }
}

async function refreshUser() {
  const res = await api('GET', '/api/me');
  state.me = res.user; state.servers = res.servers; state.specs = res.specs;
  if (state.me.is_admin) await loadAdminData();
  render();
}

// Admin actions
function banUser(id) { state.modal = { type: 'ban', userId: id }; render(); }
async function confirmBan(id) {
  const reason = document.getElementById('modal-ban-reason')?.value || '';
  try {
    await api('POST', `/api/admin/users/${id}/ban`, { reason });
    closeModal();
    toast(`ユーザーをBANしました`);
    await loadAdminData(); render();
  } catch (e) { toast(e.message, 'error'); }
}
async function unbanUser(id) {
  try {
    await api('POST', `/api/admin/users/${id}/unban`);
    toast('BANを解除しました');
    await loadAdminData(); render();
  } catch (e) { toast(e.message, 'error'); }
}
function editMaxServers(id, current) { state.modal = { type: 'max-servers', userId: id, current }; render(); }
async function confirmMaxServers(id) {
  const max = parseInt(document.getElementById('modal-max')?.value);
  try {
    await api('PATCH', `/api/admin/users/${id}/max-servers`, { max });
    closeModal();
    toast('上限を変更しました');
    await loadAdminData(); render();
  } catch (e) { toast(e.message, 'error'); }
}
async function addStaff(id) {
  if (!confirm('このユーザーを管理者にしますか？')) return;
  try {
    await api('POST', `/api/admin/users/${id}/add-staff`);
    toast('管理者に設定しました');
    await loadAdminData(); render();
  } catch (e) { toast(e.message, 'error'); }
}
async function adminExtendServer(id) {
  try {
    await api('POST', `/api/admin/servers/${id}/extend`);
    toast('期間を延長しました');
    await loadAdminData(); render();
  } catch (e) { toast(e.message, 'error'); }
}
async function adminDeleteServer(id) {
  if (!confirm('サーバーを削除しますか？')) return;
  try {
    await api('DELETE', `/api/admin/servers/${id}`);
    toast('削除しました');
    await loadAdminData(); render();
  } catch (e) { toast(e.message, 'error'); }
}
async function saveSpecs() {
  const body = {
    cpu: parseInt(document.getElementById('spec-cpu').value),
    memory: parseInt(document.getElementById('spec-mem').value),
    disk: parseInt(document.getElementById('spec-disk').value),
    duration_days: parseInt(document.getElementById('spec-days').value),
    max_servers_per_user: parseInt(document.getElementById('spec-max').value),
  };
  try {
    await api('PATCH', '/api/admin/specs', body);
    toast('設定を保存しました');
    await refreshUser();
  } catch (e) { toast(e.message, 'error'); }
}

// ── UTILS ──────────────────────────────────────────────────────────────────
function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── BOOT ───────────────────────────────────────────────────────────────────
boot();
</script>
</body>
</html>
